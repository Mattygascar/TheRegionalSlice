<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Contact The Regional Slice to share feedback, ask questions, or request pizza tips.">
  <title>The Regional Slice :: Contact</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <h1>The Regional Slice</h1>
        <p class="tagline">Explore iconic pizza styles across the U.S. and beyond.</p>
      </div>

      <nav class="site-nav" aria-label="Main Navigation">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="regions.html">Regions</a></li>
          <li><a class="active" href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Contact Us</h2>
      <p>
        Have a favorite region we should add? Want pizza tips?
        Fill out the form below.
      </p>

      <form action="#" method="post">

        <p>
          <label for="name">Name:</label><br>
          <input type="text" id="name" name="name" required>
        </p>

        <p>
          <label for="email">Email:</label><br>
          <input type="email" id="email" name="email" required>
        </p>

        <p>
          <label for="region">Favorite Region:</label><br>
          <input type="text" id="region" name="region">
        </p>

        <p>
          <label for="message">Message:</label><br>
          <textarea id="message" name="message" rows="4" cols="30" required></textarea>
        </p>

        <p>
          <input type="submit" value="Submit">
        </p>

      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p class="footer-links">
        <a href="index.html">Social Media Links</a> |
        <a href="contact.html">Email Us</a> |
        <a href="regions.html">Buy Products</a>
      </p>
      <p class="copyright">© 2026 The Regional Slice</p>
    </div>
  </footer>
</body>
</html>
